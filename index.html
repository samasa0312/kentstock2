                                <h1 className="text-2xl sm:text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-teal-600 to-emerald-500 uppercase tracking-tighter hidden md:block drop-shadow-sm">綜合查詢</h1>
                            </div>

                            {/* Module Nav */}
                            <div className="shrink-0 max-w-full overflow-x-auto no-scrollbar">
                                <ModuleNav module={module} setModule={setModule} counts={moduleCounts} globalSearch={globalSearch} />
                            </div>

                            {/* Search Box Group (包含主搜尋與安全庫存搜尋) */}
                            <div className="flex flex-wrap flex-1 gap-3 min-w-[250px] max-w-3xl shrink-0 items-center">
                                {/* 主搜尋框 */}
                                <div className="relative flex-1 min-w-[200px]">
                                    <input 
                                        type="text" 
                                        placeholder={getSearchPlaceholder()} 
                                        className="w-full bg-white/70 backdrop-blur-md border border-slate-200 rounded-lg py-2 pl-4 pr-10 text-base focus:ring-2 focus:ring-teal-500 focus:border-teal-500 outline-none text-slate-800 placeholder-slate-500 transition-all shadow-sm" 
                                        value={globalSearch} 
                                        onChange={e => setGlobalSearch(e.target.value)} 
                                    />
                                    {globalSearch && (
                                        <button className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-teal-500 transition-colors" onClick={() => setGlobalSearch('')}>
                                            <Icon name="x" className="w-5 h-5" />
                                        </button>
                                    )}
                                </div>

                                {/* 安全庫存與現有庫存搜尋框 (緊接在主搜尋框右邊，僅限物料庫存顯示) */}
                                {module === 'materialInventory' && (
                                    <>
                                        <div className="relative w-40 sm:w-44 shrink-0">
                                            <input 
                                                type="text" 
                                                placeholder="安全庫存(如 >10)" 
                                                className="w-full bg-orange-50/80 backdrop-blur-md border border-orange-200 rounded-lg py-2 pl-3 pr-8 text-base focus:ring-2 focus:ring-orange-400 focus:border-orange-400 outline-none text-slate-800 placeholder-orange-600/60 transition-all shadow-sm font-tech-mono" 
                                                value={safetySearch} 
                                                onChange={e => setSafetySearch(e.target.value)} 
                                            />
                                            {safetySearch && (
                                                <button className="absolute right-2 top-1/2 -translate-y-1/2 text-orange-400 hover:text-orange-600 transition-colors" onClick={() => setSafetySearch('')}>
                                                    <Icon name="x" className="w-4 h-4" />
                                                </button>
                                            )}
                                        </div>
                                        <div className="relative w-40 sm:w-44 shrink-0">
                                            <input 
                                                type="text" 
                                                placeholder="現有庫存(如 <5)" 
                                                className="w-full bg-blue-50/80 backdrop-blur-md border border-blue-200 rounded-lg py-2 pl-3 pr-8 text-base focus:ring-2 focus:ring-blue-400 focus:border-blue-400 outline-none text-slate-800 placeholder-blue-600/60 transition-all shadow-sm font-tech-mono" 
                                                value={stockSearch} 
                                                onChange={e => setStockSearch(e.target.value)} 
                                            />
                                            {stockSearch && (
                                                <button className="absolute right-2 top-1/2 -translate-y-1/2 text-blue-400 hover:text-blue-600 transition-colors" onClick={() => setStockSearch('')}>
                                                    <Icon name="x" className="w-4 h-4" />
                                                </button>
                                            )}
                                        </div>
                                    </>
                                )}
                            </div>

                            {/* Dynamic Actions */}
                            <div className="flex flex-wrap items-center gap-2 md:ml-auto shrink-0">
                                
                                {module === 'order' && (
                                    <div className="flex items-center gap-2 text-base text-slate-600 bg-white/70 backdrop-blur-md p-1.5 rounded-lg border border-slate-200 shadow-sm">
                                        <Icon name="calendar" className="text-teal-500 w-5 h-5 ml-1" />
                                        <input type="date" className="bg-transparent border-none text-slate-800 font-mono text-sm sm:text-base outline-none cursor-pointer" style={{colorScheme: 'light'}} value={dates.start} onChange={e => setDates({...dates, start: e.target.value})} />
                                        <span className="text-sm font-bold text-slate-400">~</span>
                                        <input type="date" className="bg-transparent border-none text-slate-700 font-mono text-sm sm:text-base outline-none cursor-pointer" style={{colorScheme: 'light'}} value={dates.end} onChange={e => setDates({...dates, end: e.target.value})} />
                                        {(dates.start || dates.end) && <button onClick={() => setDates({start:'', end:''})} className="text-red-600 hover:bg-red-50 hover:text-red-700 px-2 py-1 rounded border border-red-300 transition-colors text-xs font-bold shadow-sm ml-1">清除</button>}
                                    </div>
                                )}

                                {module === 'inventory' && (
                                    <button onClick={() => setOnlyShortage(!onlyShortage)} className={`px-3 py-1.5 rounded-lg text-sm font-bold border transition-all whitespace-nowrap shadow-sm ${onlyShortage ? 'bg-red-50 border-red-300 text-red-600' : 'bg-white border-slate-200 text-slate-600 hover:bg-slate-50 hover:text-teal-600'}`}>
                                        <div className="flex items-center gap-1"><Icon name="alert" className="w-4 h-4" /> 只看缺料</div>
                                    </button>
                                )}

                                {/* 四個模組共用上傳按鈕 */}
                                <label className={`px-3 py-1.5 bg-slate-700 border border-slate-700 text-white rounded-lg text-sm font-bold flex items-center gap-1.5 shadow-md transition-all whitespace-nowrap ${isUploading ? 'opacity-50 cursor-not-allowed' : 'cursor-pointer hover:bg-slate-800'}`}>
                                    <Icon name="upload" className={isUploading ? "w-4 h-4 animate-bounce text-white" : "w-4 h-4 text-white/90"} /> {isUploading ? '處理中...' : '上傳 Excel'}
                                    <input type="file" multiple accept=".xlsx, .xls, .csv, application/vnd.openxmlformats-officedocument.spreadsheetml.sheet, application/vnd.ms-excel, text/csv" className="hidden" onChange={e => { 
                                        const files = Array.from(e.target.files);
                                        if (files.length === 0) return;
                                        // 判斷當前模組，交由不同的 Parser 處理
                                        if (module === 'order') onUploadOrder(files);
                                        else onUploadInv(files);
                                        e.target.value=''; 
                                    }} disabled={isUploading} />
                                </label>
                            </div>
                        </div>

                        {/* Status / Message Bar (Compact) */}
                        {(currentFiles.length > 0 || msg) && (
                            <div className="px-4 py-1.5 bg-white/40 backdrop-blur-sm border-t border-slate-200/50 flex items-center gap-3 text-[10px] sm:text-xs font-mono text-slate-600 overflow-x-auto no-scrollbar">
                                {currentFiles.length > 0 && (
                                    <span className="text-teal-800 bg-teal-100/80 px-2 py-0.5 rounded border border-teal-200/50 whitespace-nowrap">
                                        來源: {currentFiles.join(', ')}
                                    </span>
                                )}
                                {msg && (
                                    <span className={`font-bold px-2 py-0.5 rounded border whitespace-nowrap ${msg.type === 'success' ? 'bg-emerald-50 text-emerald-700 border-emerald-200' : msg.type === 'info' ? 'bg-teal-50 text-teal-700 border-teal-200' : 'bg-red-50 text-red-700 border-red-200'}`}>
                                        {msg.text}
                                    </span>
                                )}
                            </div>
                        )}
                    </header>

                    <main className="flex-1 relative p-4 md:p-6 overflow-hidden">
                        <div className={`absolute inset-4 md:inset-6 transition-opacity duration-300 ${module === 'order' ? 'opacity-100 z-10' : 'opacity-0 z-0 pointer-events-none'}`}>
                            <OrderSystem data={orderState.data} columns={allOrderColumns} globalSearch={globalSearch} dates={dates} />
                        </div>
                        <div className={`absolute inset-4 md:inset-6 transition-opacity duration-300 ${module === 'inventory' ? 'opacity-100 z-10' : 'opacity-0 z-0 pointer-events-none'}`}>
                            <InventorySystem data={invState.data} globalSearch={globalSearch} onlyShortage={onlyShortage} />
                        </div>
                        <div className={`absolute inset-4 md:inset-6 transition-opacity duration-300 ${module === 'materialInventory' ? 'opacity-100 z-10' : 'opacity-0 z-0 pointer-events-none'}`}>
                            <StockSystem title="物料庫存" data={invState.data.materialInventory || []} showDataPanel={true} globalSearch={globalSearch} safetySearch={safetySearch} stockSearch={stockSearch} />
                        </div>
                        <div className={`absolute inset-4 md:inset-6 transition-opacity duration-300 ${module === 'consumableInventory' ? 'opacity-100 z-10' : 'opacity-0 z-0 pointer-events-none'}`}>
                            <StockSystem title="耗材庫存" data={invState.data.consumableInventory || []} showDataPanel={false} globalSearch={globalSearch} safetySearch={safetySearch} />
                        </div>
                    </main>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>

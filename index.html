                                            const parsedSafety = parseFloat(row.safetyStock);
                                            const displaySafety = isNaN(parsedSafety) ? 0 : Math.round(parsedSafety);
                                            const safetyColorClass = displaySafety < 0 ? 'text-red-600' : 'text-slate-700';
                                            return (
                                                <tr key={idx} className="hover:bg-white/60 transition-colors">
                                                    <td className="p-3 sm:p-4 text-center text-slate-500 font-sans whitespace-nowrap">{idx + 1}</td>
                                                    <td className="p-3 sm:p-4 font-bold text-slate-800 text-left break-all">{row.id}</td>
                                                    <td className="p-3 sm:p-4 text-slate-600 text-[10px] sm:text-sm font-sans leading-relaxed break-words">{row.spec}</td>
                                                    <td className="p-3 sm:p-4 text-center font-black text-slate-800 text-base sm:text-lg bg-white/40 whitespace-nowrap border-x border-white/30">
                                                        {title === '物料庫存' && Number(row.allUsageStock) < 0 ? 0 : row.allUsageStock}
                                                    </td>
                                                    {title === '物料庫存' && (
                                                        <td className={`p-3 sm:p-4 text-center font-bold text-base sm:text-lg bg-white/40 whitespace-nowrap border-r border-white/30 ${safetyColorClass}`}>
                                                            {displaySafety}
                                                        </td>
                                                    )}
                                                    {showDataPanel && (
                                                        <td className="p-3 sm:p-4 text-center font-sans whitespace-nowrap">
                                                            <button onClick={() => setSelected(row)} className="px-2 py-1 sm:px-3 sm:py-1.5 bg-blue-600 text-white border border-blue-700 rounded text-[10px] sm:text-xs font-bold hover:bg-blue-700 hover:shadow-md transition-colors shadow-sm whitespace-nowrap">季報與平均</button>
                                                        </td>
                                                    )}
                                                </tr>
                                            );
                                        })}
                                        {filtered.length === 0 && (
                                            <tr><td colSpan={6} className="px-6 py-20 text-center text-slate-500 font-bold text-base sm:text-lg font-sans">查無相符資料</td></tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}
                    {showDataPanel && selected && <YearlyDataModal title={title} item={selected} onClose={() => setSelected(null)} />}
                </div>
            );
        };

        // ==========================================
        // 修改：詳細資訊整合系統元件 (DetailedInfoSystem)
        // 💡 僅讀取工單的預計進出貨日期，不讀取「進貨表」
        // 💡 進出貨時程內文設定為 whitespace-pre-wrap 完全依照實際文字內容換行
        // ==========================================
        const DetailedInfoSystem = ({ orderData, invData, globalSearch, orderColumns }) => {
            const query = (globalSearch || '').trim().toLowerCase();
            const [selectedOrder, setSelectedOrder] = useState(null);

            const actualInventoryMap = useMemo(() => {
                const map = {};
                if (invData.materialInventory) invData.materialInventory.forEach(item => { if (item.id) map[String(item.id).trim().toLowerCase()] = item.allUsageStock; });
                if (invData.consumableInventory) invData.consumableInventory.forEach(item => { if (item.id) map[String(item.id).trim().toLowerCase()] = item.allUsageStock; });
                return map;
            }, [invData.materialInventory, invData.consumableInventory]);

            const getDisplayStock = (partNo, originalStock) => {
                if (!partNo) return originalStock;
                const normalizedPartNo = String(partNo).trim().toLowerCase();
                return actualInventoryMap[normalizedPartNo] !== undefined ? actualInventoryMap[normalizedPartNo] : originalStock;
            };

            // 💡 負庫存關聯工單查詢
            const getRelatedWorkOrders = (partNo) => {
                if (!partNo) return [];
                const target = String(partNo).trim().toLowerCase();
                const list = [];
                // 搜尋工單
                if (invData.workOrders) {
                    invData.workOrders.forEach(wo => {
                        if (String(wo.partNo).trim().toLowerCase() === target) {
                            list.push({ id: wo.id, qty: wo.plannedQty });
                        }
                    });
                }
                // 搜尋已發放
                if (invData.issued) {
                    invData.issued.forEach(wo => {
                        if (String(wo.partNo).trim().toLowerCase() === target) {
                            list.push({ id: wo.id, qty: wo.plannedQty });
                        }
                    });
                }
                return list;
            };

            const allWOs = useMemo(() => {
                return [
                    ...(invData.workOrders || []),
                    ...(invData.issued || []),
                    ...(invData.pendingShipment || [])
                ];
            }, [invData.workOrders, invData.issued, invData.pendingShipment]);

            const results = useMemo(() => {
                if (!query) return { orders: [], workOrders: [], inventory: [] };

                // 1. 篩選相關訂單 (來源：訂單管理)
                const matchedOrders = orderData.filter(o => isMatch(Object.values(o), query));

                // 收集已匹配項目中所有的關聯工單號
                const associatedWOIds = new Set([
                    ...matchedOrders.map(o => String(o.workOrder || '').trim().toLowerCase())
                ].filter(Boolean));

                // 2. 篩選用料明細 (包含直系搜尋或對應至關聯工單者，💡 排除「進貨表」關聯)
                const groupedWOs = getGroupedAndFilteredData(allWOs, "", false);
                const matchedWOs = groupedWOs.filter(g => {
                    const isDirect = isMatch([g.id, g.customer, g.mainSpec, g.recvDate, g.shipDate], query);
                    const isRelational = g.id && associatedWOIds.has(String(g.id).trim().toLowerCase());
                    return isDirect || isRelational;
                });

                // 收集相關用料明細與進出貨中的所有關聯料號
                const relevantPartNos = new Set([
                    ...matchedOrders.map(o => String(o.bfPart || '').trim().toLowerCase()),
                    ...matchedOrders.map(o => String(o.custPart || '').trim().toLowerCase()),
                    ...matchedWOs.flatMap(g => g.items.map(i => String(i.partNo || '').trim().toLowerCase()))
                ].filter(Boolean));

                // 3. 篩選物料庫存
                const matchedInventory = (invData.materialInventory || []).filter(item => {
                    const isDirect = isMatch([item.id, item.spec], query);
                    const isRelational = item.id && relevantPartNos.has(String(item.id).trim().toLowerCase());
                    return isDirect || isRelational;
                });

                return {
                    orders: matchedOrders,
                    workOrders: matchedWOs,
                    inventory: matchedInventory
                };
            }, [orderData, invData.materialInventory, allWOs, query]);

            const visibleOrderColumns = useMemo(() => {
                if (!orderColumns) return [];
                return orderColumns.filter(col => 
                    col.id !== 'recvDate' && 
                    col.id !== 'shipDate' && 
                    col.id !== 'fileSource' &&
                    col.id !== 'notes' &&
                    col.id !== 'remarks'
                );
            }, [orderColumns]);

            if (!query) {
                return (
                    <div className="flex flex-col items-center justify-center h-full p-8 text-teal-600">
                        <div className="content-panel rounded-full p-8 mb-6 border-slate-200">
                            <Icon name="info" className="w-20 h-20 text-teal-500" />
                        </div>
                        <p className="text-xl font-bold text-teal-700 tracking-wider text-center">請在上方搜尋欄輸入關鍵字進行詳細查詢</p>
                        <p className="text-sm text-slate-500 mt-2 text-center max-w-md leading-relaxed">
                            在全域搜尋輸入<strong>工單號、客戶、料號或規格</strong>，系統將智慧整合並串起對應的「工單、進貨資訊與用料明細&庫存狀況」。
                        </p>
                    </div>
                );
            }

            const isEmpty = !results.orders.length && !results.workOrders.length;

            if (isEmpty) {
                return (
                    <div className="flex flex-col items-center justify-center h-full p-8 text-slate-500">
                        <div className="content-panel rounded-full p-8 mb-6 border-slate-200">
                            <Icon name="x" className="w-20 h-20 text-slate-400" />
                        </div>
                        <p className="text-xl font-bold text-slate-700 tracking-wider text-center">查無關聯整合資料</p>
                        <p className="text-sm text-slate-400 mt-2 text-center">您可以嘗試更換搜尋關鍵字，或確認檔案內是否存在此項目。</p>
                    </div>
                );
            }

            return (
                <div className="h-full overflow-y-auto pb-12 pr-2">
                    <div className="grid grid-cols-1 xl:grid-cols-2 gap-6">
                        {/* 1. 工單 - 單獨在上方一排顯示 (全寬) */}
                        <div className="content-panel p-5 flex flex-col h-[380px] xl:col-span-2">
                            <div className="flex items-center gap-2 mb-3 border-b border-slate-200/50 pb-2">
                                <Icon name="clipboard-list" className="w-5 h-5 text-teal-600" />
                                <h3 className="font-bold text-slate-800 text-base sm:text-lg">工單 ({results.orders.length})</h3>
                            </div>
                            <div className="overflow-auto flex-1">
                                {results.orders.length === 0 ? (
                                    <p className="text-sm text-slate-400 text-center py-20">無工單資料</p>
                                ) : (
                                    <table className="w-full table-auto text-left text-xs sm:text-sm border-collapse">
                                        <thead className="bg-slate-50 sticky top-0 font-bold text-slate-700 border-b border-slate-200">
                                            <tr>
                                                {visibleOrderColumns.map(col => (
                                                    <th key={col.id} className="px-3 py-2 whitespace-nowrap">{col.label}</th>
                                                ))}
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100 text-slate-600">
                                            {results.orders.map((o, idx) => (
                                                <tr key={idx} className="hover:bg-slate-50/50">
                                                    {visibleOrderColumns.map(col => (
                                                        <td key={col.id} className="px-3 py-2 whitespace-nowrap">
                                                            {col.id === 'workOrder' ? (
                                                                <button 
                                                                    onClick={() => setSelectedOrder(o)} 
                                                                    className="font-bold text-teal-700 hover:text-teal-500 hover:underline text-left transition-all"
                                                                >
                                                                    {o[col.id] || '-'}
                                                                </button>
                                                            ) : (
                                                                o[col.id] || '-'
                                                            )}
                                                        </td>
                                                    ))}
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                )}
                            </div>
                        </div>

                        {/* 💡 2. 進貨與出貨資訊並排顯示 (左側"進貨資訊"右側"出貨資訊" - 僅顯示預計進出貨日期，其餘資訊皆隱藏，並支援完全換行) */}
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 xl:col-span-2">
                            {/* 左側：進貨資訊 (💡 來源已完全移除「進貨表」，僅透過用料工單顯示) */}
                            <div className="content-panel p-5 flex flex-col h-[480px]">
                                <div className="flex items-center gap-2 mb-3 border-b border-slate-200/50 pb-2">
                                    <Icon name="calendar" className="w-5 h-5 text-blue-600" />
                                    <h3 className="font-bold text-slate-800 text-base sm:text-lg">
                                        進貨資訊 ({results.workOrders.filter(g => g.recvDate).length})
                                    </h3>
                                </div>
                                <div className="overflow-auto flex-1 px-1 space-y-3">
                                    {/* (A) 用料工單的預計進貨日 (💡 極簡化與垂直堆疊樣式：完全依照資訊內容換行) */}
                                    {results.workOrders.filter(g => g.recvDate).map((g, idx) => (
                                        <div key={`wo-recv-${idx}`} className="bg-blue-50/30 hover:bg-white/95 p-3.5 rounded-lg border border-blue-100 shadow-sm transition-all text-left">
                                            <div className="text-xs sm:text-sm flex flex-col gap-1.5">
                                                <div className="flex items-center gap-2 border-b border-blue-50 pb-1">
                                                    <span className="px-1.5 py-0.5 rounded text-[10px] font-bold bg-blue-100 text-blue-800 border border-blue-200">工單</span>
                                                    <span className="font-bold text-slate-800 font-tech-mono">{g.id}</span>
                                                </div>
                                                <div className="font-medium text-slate-600">
                                                    預計進貨日：
                                                    <div className="text-blue-700 font-extrabold whitespace-pre-wrap break-all mt-1 leading-relaxed">
                                                        {g.recvDate}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                    {results.workOrders.filter(g => g.recvDate).length === 0 && (
                                        <p className="text-sm text-slate-400 text-center py-20">無進貨資訊</p>
                                    )}
                                </div>
                            </div>

                            {/* 右側：出貨資訊 (💡 極簡化與垂直堆疊樣式：完全依照資訊內容換行) */}
                            <div className="content-panel p-5 flex flex-col h-[480px]">
                                <div className="flex items-center gap-2 mb-3 border-b border-slate-200/50 pb-2">
                                    <Icon name="truck" className="w-5 h-5 text-purple-600" />
                                    <h3 className="font-bold text-slate-800 text-base sm:text-lg">
                                        出貨資訊 ({results.workOrders.filter(g => g.shipDate).length})
                                    </h3>
                                </div>
                                <div className="overflow-auto flex-1 px-1 space-y-3">
                                    {/* (A) 用料工單的預計出貨日 (💡 極簡化與垂直堆疊樣式：完全依照資訊內容換行) */}
                                    {results.workOrders.filter(g => g.shipDate).map((g, idx) => (
                                        <div key={`wo-ship-${idx}`} className="bg-purple-50/30 hover:bg-white/95 p-3.5 rounded-lg border border-purple-100 shadow-sm transition-all text-left">
                                            <div className="text-xs sm:text-sm flex flex-col gap-1.5">
                                                <div className="flex items-center gap-2 border-b border-purple-50 pb-1">
                                                    <span className="px-1.5 py-0.5 rounded text-[10px] font-bold bg-purple-100 text-purple-800 border border-purple-200">工單</span>
                                                    <span className="font-bold text-slate-800 font-tech-mono">{g.id}</span>
                                                </div>
                                                <div className="font-medium text-slate-600">
                                                    預計出貨日：
                                                    <div className="text-purple-700 font-extrabold whitespace-pre-wrap break-all mt-1 leading-relaxed">
                                                        {g.shipDate}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                    {results.workOrders.filter(g => g.shipDate).length === 0 && (
                                        <p className="text-sm text-slate-400 text-center py-20">無出貨資訊</p>
                                    )}
                                </div>
                            </div>
                        </div>

                        {/* 3. 用料明細&庫存 - 在下方單獨一整排大區塊顯示（明細內字體已全面放大） */}
                        <div className="content-panel p-5 flex flex-col h-fit xl:col-span-2">
                            <div className="flex items-center gap-2 mb-3 border-b border-slate-200/50 pb-2">
                                <Icon name="spreadsheet" className="w-5 h-5 text-teal-600" />
                                <h3 className="font-bold text-slate-800 text-base sm:text-lg">用料明細&庫存 ({results.workOrders.length})</h3>
                            </div>
                            <div className="space-y-4">
                                {results.workOrders.length === 0 ? (
                                    <p className="text-sm text-slate-400 text-center py-24">無用料明細&庫存</p>
                                ) : (
                                    results.workOrders.map(g => (
                                        <div key={g.id} className="border border-slate-200/60 bg-white/40 p-4 rounded-lg shadow-sm">
                                            <div className="flex justify-between items-center border-b border-slate-200/50 pb-2 mb-3">
                                                <span className="font-bold text-teal-800 text-base sm:text-lg">{g.id}</span>
                                                <StatusBadge status={g.mainStatus} className="scale-95" />
                                            </div>
                                            <div className="text-sm text-slate-600 mb-3" title={`${g.customer} | ${g.mainSpec}`}>
                                                <span className="font-bold text-slate-800">{g.customer}</span> <span className="mx-2 text-slate-300">|</span> <span>{g.mainSpec}</span>
                                            </div>
                                            {/* 💡 明細內容字體已放大，排版更寬敞 */}
                                            <div className="space-y-2.5 text-sm sm:text-base">
                                                {g.items.map((item, idx) => {
                                                    const stockVal = parseFloat(getDisplayStock(item.partNo, item.stockQty));
                                                    const isNegative = !isNaN(stockVal) && stockVal < 0;
                                                    const relatedWOs = isNegative ? getRelatedWorkOrders(item.partNo) : [];

                                                    return (
                                                        <div key={idx} className="bg-white/70 p-3 rounded-lg border border-slate-100 flex flex-col gap-2 shadow-sm">
                                                            <div className="flex flex-col sm:flex-row justify-between gap-1.5 sm:gap-4 items-start sm:items-center">
                                                                <span className="font-mono font-bold text-slate-800 text-base">{item.partNo}</span>
                                                                <span className="text-slate-500 break-words max-w-full sm:max-w-[240px] md:max-w-[320px] text-sm" title={item.spec}>{item.spec}</span>
                                                                <div className="flex gap-4 text-right whitespace-nowrap text-sm sm:text-base ml-auto">
                                                                    <span className="text-teal-600 font-bold">需求: {item.plannedQty}</span>
                                                                    <span className={isNegative ? "text-red-500 font-extrabold text-base" : "text-slate-600 font-semibold"}>
                                                                        庫存: {getDisplayStock(item.partNo, item.stockQty)}
                                                                    </span>
                                                                </div>
                                                            </div>
                                                            
                                                            {isNegative && relatedWOs.length > 0 && (
                                                                <div className="mt-2 pl-3.5 border-l-2 border-red-400 space-y-1.5 bg-red-50/40 p-2.5 rounded-lg text-xs sm:text-sm">
                                                                    <div className="font-bold text-red-600 uppercase tracking-wider flex items-center gap-1">
                                                                        <Icon name="alert" className="w-4 h-4 text-red-500 shrink-0" />
                                                                        相關工單追蹤 ({relatedWOs.length})
                                                                    </div>
                                                                    <div className="max-h-[140px] overflow-y-auto space-y-1">
                                                                        {relatedWOs.map((rwo, rIdx) => (
                                                                            <div key={rIdx} className="flex justify-between text-xs text-slate-600 bg-white/80 px-2.5 py-1 rounded border border-red-100/40 font-mono">
                                                                                <span className="text-teal-700 font-bold">{rwo.id}</span>
                                                                                <span>用料表需求: <span className="font-bold text-slate-800">{rwo.qty}</span></span>
                                                                            </div>
                                                                        ))}
                                                                    </div>
                                                                </div>
                                                            )}
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>
                    </div>

                    {/* 工單彈出明細視窗 */}
                    {selectedOrder && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm" onClick={() => setSelectedOrder(null)}>
                            <div className="bg-white/85 backdrop-blur-md border border-slate-200/50 w-full max-w-2xl rounded-xl overflow-hidden shadow-xl modal-animate" onClick={e => e.stopPropagation()}>
                                <div className="bg-white/60 p-5 border-b border-slate-200/50 flex justify-between items-center relative">
                                    <div className="absolute top-0 left-0 w-1.5 h-full bg-teal-500"></div>
                                    <div className="font-bold text-slate-800 pl-2 text-xl text-left">工單詳細資訊：{selectedOrder.workOrder}</div>
                                    <button onClick={() => setSelectedOrder(null)} className="text-slate-400 hover:text-teal-600 transition-colors"><Icon name="x" className="w-6 h-6" /></button>
                                </div>
                                <div className="p-6 space-y-5 text-left max-h-[70vh] overflow-y-auto">
                                    <div>
                                        <label className="text-sm font-bold text-teal-600 uppercase">作業注意事項</label>
                                        <div className="bg-white/50 p-4 rounded-lg mt-2 text-base border border-slate-200/50 text-slate-700 leading-relaxed whitespace-pre-wrap">
                                            {selectedOrder.notes || '無'}
                                        </div>
                                    </div>
                                    <div>
                                        <label className="text-sm font-bold text-teal-600 uppercase">備註</label>
                                        <div className="bg-white/50 p-4 rounded-lg mt-2 text-base border border-slate-200/50 text-slate-700 leading-relaxed whitespace-pre-wrap">
                                            {selectedOrder.remarks || '無'}
                                        </div>
                                    </div>
                                </div>
                                <div className="bg-white/40 px-6 py-4 flex justify-end border-t border-slate-200/50">
                                    <button onClick={() => setSelectedOrder(null)} className="px-6 py-2.5 bg-teal-600 text-white rounded-lg font-bold text-base hover:bg-teal-700 transition-colors shadow-sm">關閉視窗</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ==========================================
        // 5. 主應用程式
        // ==========================================
        function App() {
            const allOrderColumns = [
                { id: 'shipDate', label: '預計出貨日期', keys: ['預計出貨日期', '預計出貨日', '實際出貨日期', '出貨日期', '實際出貨日'] },
                { id: 'recvDate', label: '預計進貨日', keys: ['預計進貨日', '預計進貨日期', '收貨日期', '收貨日期(到貨日)', '(到貨日)', '到貨日'] },
                { id: 'client', label: '客戶', keys: ['客戶'] },
                { id: 'sales', label: '業務&終端', keys: ['業務&終端客戶', '業務'] },
                { id: 'workOrder', label: '工單號碼', keys: ['工單號碼'] },
                { id: 'purchaseOrder', label: '採購單號', keys: ['採購單號'] },
                { id: 'bfPart', label: '博豐料號', keys: ['博豐料號'] },
                { id: 'content', label: '作業內容', keys: ['作業內容'] },
                { id: 'purchase', label: '代購品項', keys: ['代購品項'] },
                { id: 'brand', label: '廠牌', keys: ['廠牌'] },
                { id: 'model', label: '機種', keys: ['機種'] },
                { id: 'qty', label: '作業數量', keys: ['作業數量', '數量', '作業\n數量'] },
                { id: 'custPart', label: '客戶料號', keys: ['客戶料號', '客戶品號', 'Customer P/N', 'Customer PN', '料號', '品號'] },
                { id: 'custPo', label: '客戶 PO NO.', keys: ['客戶 PO NO.', '客戶PO NO.', '客戶 PO NO', '客戶PO', 'PO NO', 'PO NO.', 'PO#', 'Customer PO'] },
                { id: 'fileSource', label: '檔案來源', keys: [] }, 
                { id: 'notes', label: '作業注意事項', keys: ['作業注意事項', '注意事項', '作業注意'] },
                { id: 'remarks', label: '備註', keys: ['備註', '備註欄'] }
            ];

            const [module, setModule] = useState('purchaseInfo'); 
            const [isUploading, setIsUploading] = useState(false); 
            const [isSyncing, setIsSyncing] = useState(false);
            const [msg, setMsg] = useState(null);
            const [globalSearch, setGlobalSearch] = useState('');
            const [safetySearch, setSafetySearch] = useState(''); 
            const [stockSearch, setStockSearch] = useState(''); 
            const [dates, setDates] = useState({ start: '', end: '' });
            const [onlyShortage, setOnlyShortage] = useState(false);
            const [onlyAbnormal, setOnlyAbnormal] = useState(false); 
            const [orderState, setOrderState] = useState({ data: [], files: [] });
            const [invState, setInvState] = useState({ 
                data: { purchaseInfo: [], workOrders: [], issued: [], pendingShipment: [], materialInventory: [], consumableInventory: [] }, 
                files: [] 
            });

            const [showApiModal, setShowApiModal] = useState(false);
            const [apiKey, setApiKey] = useState(''); 

            const syncFromApi = async (customApiKey) => {
                if (!customApiKey.trim()) return;
                
                setIsSyncing(true);
                setMsg({ type: 'info', text: '正在發送金鑰進行驗證...' });
                
                try {
                    const API_URL = "https://defaultc88f0a0ed1474693bc04daf56552e7.cf.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/cfa0cd8f237d4fafb6a8b9d85b69207a/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=kS5RzwKaQyXw1OVD3h0-26hvoJoDDADObnmlux5U2m8";

                    const reqHeaders = {
                        'x-api-key': customApiKey.trim()
                    };
                    
                    if (customApiKey.trim().startsWith('Bearer ')) {
                        reqHeaders['Authorization'] = customApiKey.trim();
                    }

                    const response = await fetch(API_URL, {
                        method: 'GET', 
                        headers: reqHeaders
                    });

                    if (response.status === 401) {
                        throw new Error('401 Unauthorized: 權限驗證失敗。請確認金鑰是否正確，或 Power Automate 觸發條件是否設為「任何人(Anyone)設定」。');
                    }
                    
                    if (!response.ok) {
                        throw new Error(`連線失敗 (狀態碼: ${response.status})。請檢查後端服務狀態。`);
                    }
                    
                    const json = await response.json();
                    const processedData = processJsonToInvState(json);
                    
                    // 💡 雲端同步也改為智慧累加合併，不覆蓋既有資訊
                    setInvState(prev => {
                        const nextPurchases = [...(prev.data.purchaseInfo || [])];
                        processedData.purchaseInfo.forEach(p => {
                            const exists = nextPurchases.some(orig => orig.workOrder === p.workOrder && orig.date === p.date && orig.partNo === p.partNo);
                            if (!exists) nextPurchases.push(p);
                        });
                        return {
                            ...prev,
                            data: {
                                ...prev.data,
                                purchaseInfo: nextPurchases
                            },
                            files: prev.files.includes('Cloud API Source') ? prev.files : [...prev.files, 'Cloud API Source']
                        };
                    });
                    
                    setMsg({ type: 'success', text: `同步成功！已合併獲取 ${processedData.purchaseInfo.length} 筆進貨資料` });
                } catch (err) {
                    console.error('Sync Error:', err);
                    setMsg({ type: 'error', text: err.message || '發生不明連線錯誤，請稍後再試' });
                } finally {
                    setIsSyncing(false);
                    setTimeout(() => setMsg(null), 8000); 
                }
            };

            const moduleCounts = useMemo(() => {
                const s = globalSearch.trim().toLowerCase();
                const ss = safetySearch.trim();
                const stkS = stockSearch.trim();

                const countMatches = (dataArray, applyAdvancedFilters = false, key = '') => {
                    if (!dataArray) return 0;
                    return dataArray.filter(i => {
                        const matchesGlobal = isMatch(Object.values(i), globalSearch);
                        let matchesSafety = true; let matchesStock = true;
                        let matchesPurchaseAbnormal = true;

                        if (key === 'purchaseInfo' && onlyAbnormal) {
                            matchesPurchaseAbnormal = i.status && String(i.status).trim() !== '';
                        }

                        if (applyAdvancedFilters) {
                            if (ss) {
                                const parsedSafety = parseFloat(i.safetyStock); const displaySafety = isNaN(parsedSafety) ? 0 : Math.round(parsedSafety);
                                const opMatch = ss.match(/^([><]=?|=)\s*(-?\d+(\.\d+)?)/);
                                if (opMatch) {
                                    const op = opMatch[1]; const val = parseFloat(opMatch[2]);
                                    if (op === '>') matchesSafety = displaySafety > val;
                                    else if (op === '>=') matchesSafety = displaySafety >= val;
                                    else if (op === '<') matchesSafety = displaySafety < val;
                                    else if (op === '<=') matchesSafety = displaySafety <= val;
                                    else if (op === '=') matchesSafety = displaySafety === val;
                                } else matchesSafety = String(displaySafety).includes(ss);
                            }
                            if (stkS) {
                                const parsedStock = parseFloat(i.allUsageStock); const displayStock = isNaN(parsedStock) ? 0 : (parsedStock < 0 ? 0 : parsedStock);
                                const opMatch = stkS.match(/^([><]=?|=)\s*(-?\d+(\.\d+)?)/);
                                if (opMatch) {
                                    const op = opMatch[1]; const val = parseFloat(opMatch[2]);
                                    if (op === '>') matchesStock = displayStock > val;
                                    else if (op === '>=') matchesStock = displayStock >= val;
                                    else if (op === '<') matchesStock = displayStock < val;
                                    else if (op === '<=') matchesStock = displayStock <= val;
                                    else if (op === '=') matchesStock = displayStock === val;
                                } else matchesStock = String(displayStock).includes(stkS);
                            }
                        }
                        return matchesGlobal && matchesSafety && matchesStock && matchesPurchaseAbnormal;
                    }).length;
                };

                let invMatchCount = 0;
                if (!s) {
                    const groups = new Set();
                    ['workOrders', 'issued', 'pendingShipment'].forEach(key => (invState.data[key] || []).forEach(item => { if (item.id) groups.add(item.id); }));
                    invMatchCount = groups.size;
                } else {
                    const groups = {};
                    ['workOrders', 'issued', 'pendingShipment'].forEach(key => (invState.data[key] || []).forEach(item => {
                        const id = item.id || '未知單號';
                        if (!groups[id]) groups[id] = { id, customer: item.customer || '', mainSpec: item.spec || '', recvDate: item.recvDate || '', shipDate: item.shipDate || '' };
                        if (!groups[id].recvDate && item.recvDate) groups[id].recvDate = item.recvDate;
                        if (!groups[id].shipDate && item.shipDate) groups[id].shipDate = item.shipDate;
                    }));
                    invMatchCount = Object.values(groups).filter(g => isMatch(Object.values(g), globalSearch)).length;
                }

                let detailedCount = 0;
                if (s) {
                    const orderMatches = orderState.data.filter(o => isMatch(Object.values(o), s)).length;
                    // 💡 詳細資訊不累計進貨表搜尋計數
                    detailedCount = orderMatches;
                }

                return { 
                    purchaseInfo: countMatches(invState.data.purchaseInfo, false, 'purchaseInfo'),
                    order: countMatches(orderState.data, false), 
                    inventory: invMatchCount, 
                    materialInventory: countMatches(invState.data.materialInventory, true), 
                    consumableInventory: countMatches(invState.data.consumableInventory, false),
                    detailedInfo: detailedCount
                };
            }, [orderState.data, invState.data, globalSearch, safetySearch, stockSearch, onlyAbnormal]);

            // 💡 所有群組與上傳按鈕已修改為可同時上傳多檔案，並智慧追加合併
            const onUploadOrder = async (files) => {
                if (!files || files.length === 0) return;
                setIsUploading(true); setMsg({ type: 'info', text: '正在載入並解析多個訂單檔案...' });
                try {
                    const results = await Promise.all(files.map(file => readExcelFile(file).then(workbook => parseOrderData(workbook, allOrderColumns))));
                    let merged = []; 
                    results.forEach(res => merged = [...merged, ...res.data]);
                    
                    setOrderState(prev => ({
                        data: [...prev.data, ...merged],
                        files: [...new Set([...prev.files, ...files.map(f => f.name)])]
                    }));
                    setMsg({ type: 'success', text: `成功載入並合併 ${files.length} 個訂單檔案！` });
                } catch (err) { setMsg({ type: 'error', text: '上傳失敗：檔案結構不符' }); }
                finally { setIsUploading(false); setTimeout(() => setMsg(null), 5000); }
            };

            // 💡 所有群組與上傳按鈕已修改為可同時上傳多檔案，並智慧追加合併
            const onUploadInv = async (files) => {
                if (!files || files.length === 0) return;
                setIsUploading(true); setMsg({ type: 'info', text: '正在載入並解析多個用料庫存檔案...' });
                try {
                    const results = await Promise.all(files.map(file => readExcelFile(file).then(workbook => parseInventoryData(workbook))));
                    let merged = { purchaseInfo: [], workOrders: [], issued: [], pendingShipment: [], materialInventory: [], consumableInventory: [] };
                    results.forEach(res => {
                        Object.keys(merged).forEach(key => merged[key] = [...merged[key], ...res.data[key]]);
                    });
                    
                    setInvState(prev => {
                        const newData = {};
                        Object.keys(prev.data).forEach(key => {
                            newData[key] = [...(prev.data[key] || []), ...(merged[key] || [])];
                        });
                        return {
                            data: newData,
                            files: [...new Set([...prev.files, ...files.map(f => f.name)])]
                        };
                    });
                    setMsg({ type: 'success', text: `成功解析並合併 ${files.length} 個用料庫存檔案！` });
                } catch (err) { setMsg({ type: 'error', text: '上傳失敗：資料解析錯誤' }); }
                finally { setIsUploading(false); setTimeout(() => setMsg(null), 5000); }
            };

            const getSearchPlaceholder = () => {
                if (module === 'order') return "搜尋客戶 / 工單 / 料號...";
                if (module === 'inventory') return "搜尋單號 / 客戶 / 規格...";
                if (module === 'purchaseInfo') return "搜尋日期 / 客戶 / 工單 / 料號...";
                if (module === 'detailedInfo') return "搜尋工單號碼 / 料號 / 客戶名稱...";
                return "搜尋料號 / 品名...";
            };

            const currentFiles = module === 'order' ? orderState.files : invState.files;

            return (
                <div className="h-screen w-full flex flex-col overflow-hidden bg-transparent font-sans text-slate-800 relative">
                    <header className="content-panel rounded-none border-x-0 border-t-0 border-b border-slate-200 shrink-0 z-20 relative flex flex-col">
                        <div className="px-4 py-3 flex flex-wrap items-center gap-3">
                            <div className="flex items-center gap-2 shrink-0 md:mr-2">
                                <div className="w-8 h-8 bg-teal-50 border border-teal-200 rounded-lg flex items-center justify-center shadow-sm">
                                    <Icon name="layers" className="w-5 h-5 text-teal-600" />
                                </div>
                                <h1 className="text-2xl sm:text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-teal-600 to-emerald-500 uppercase tracking-tighter hidden md:block drop-shadow-sm">綜合查詢</h1>
                            </div>
                            <div className="shrink-0 max-w-full overflow-x-auto no-scrollbar">
                                <ModuleNav module={module} setModule={setModule} counts={moduleCounts} globalSearch={globalSearch} />
                            </div>
                            <div className="flex flex-wrap flex-1 gap-3 min-w-[250px] max-w-4xl shrink-0 items-center">
                                <div className="relative flex-1 min-w-[200px]">
                                    <input type="text" placeholder={getSearchPlaceholder()} className="w-full bg-white/70 backdrop-blur-md border border-slate-200 rounded-lg py-2 pl-4 pr-10 text-base focus:ring-2 focus:ring-teal-500 outline-none shadow-sm" value={globalSearch} onChange={e => setGlobalSearch(e.target.value)} />
                                    {globalSearch && <button className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-teal-500" onClick={() => setGlobalSearch('')}><Icon name="x" className="w-5 h-5" /></button>}
                                </div>
                                {module === 'materialInventory' && (
                                    <>
                                        <div className="relative w-40 sm:w-44 shrink-0">
                                            <input type="text" placeholder="安全庫存差異(如 >10)" className="w-full bg-orange-50/80 backdrop-blur-md border border-orange-200 rounded-lg py-2 pl-3 pr-8 text-base outline-none font-tech-mono" value={safetySearch} onChange={e => setSafetySearch(e.target.value)} />
                                            {safetySearch && <button className="absolute right-2 top-1/2 -translate-y-1/2 text-orange-400" onClick={() => setSafetySearch('')}><Icon name="x" className="w-4 h-4" /></button>}
                                        </div>
                                        <div className="relative w-40 sm:w-44 shrink-0">
                                            <input type="text" placeholder="現有實際庫存(如 <5)" className="w-full bg-blue-50/80 backdrop-blur-md border border-blue-200 rounded-lg py-2 pl-3 pr-8 text-base outline-none font-tech-mono" value={stockSearch} onChange={e => setStockSearch(e.target.value)} />
                                            {stockSearch && <button className="absolute right-2 top-1/2 -translate-y-1/2 text-blue-400" onClick={() => setStockSearch('')}><Icon name="x" className="w-4 h-4" /></button>}
                                        </div>
                                    </>
                                )}
                            </div>
                            <div className="flex flex-wrap items-center gap-2 md:ml-auto shrink-0">
                                {module === 'order' && (
                                    <div className="flex items-center gap-2 text-base text-slate-600 bg-white/70 backdrop-blur-md p-1.5 rounded-lg border border-slate-200 shadow-sm">
                                        <Icon name="calendar" className="text-teal-500 w-5 h-5 ml-1" />
                                        <input type="date" className="bg-transparent border-none text-slate-800 font-mono text-sm sm:text-base outline-none cursor-pointer" style={{colorScheme: 'light'}} value={dates.start} onChange={e => setDates({...dates, start: e.target.value})} />
                                        <span className="text-sm font-bold text-slate-400">~</span>
                                        <input type="date" className="bg-transparent border-none text-slate-700 font-mono text-sm sm:text-base outline-none cursor-pointer" style={{colorScheme: 'light'}} value={dates.end} onChange={e => setDates({...dates, end: e.target.value})} />
                                        {(dates.start || dates.end) && <button onClick={() => setDates({start:'', end:''})} className="text-red-600 hover:bg-red-50 px-2 py-1 rounded border border-red-300 text-xs font-bold">清除</button>}
                                    </div>
                                )}
                                {module === 'inventory' && (
                                    <button onClick={() => setOnlyShortage(!onlyShortage)} className={`px-3 py-1.5 rounded-lg text-sm font-bold border transition-all whitespace-nowrap shadow-sm ${onlyShortage ? 'bg-red-50 border-red-300 text-red-600' : 'bg-white border-slate-200 text-slate-600 hover:bg-slate-50'}`}>
                                        <div className="flex items-center gap-1"><Icon name="alert" className="w-4 h-4" /> 只看缺料</div>
                                    </button>
                                )}
                                {module === 'purchaseInfo' && ( 
                                    <button onClick={() => setOnlyAbnormal(!onlyAbnormal)} className={`px-3 py-1.5 rounded-lg text-sm font-bold border transition-all whitespace-nowrap shadow-sm ${onlyAbnormal ? 'bg-amber-50 border-amber-300 text-amber-700' : 'bg-white border-slate-200 text-slate-600 hover:bg-slate-50'}`}>
                                        <div className="flex items-center gap-1.5"><Icon name="file-warning" className="w-4 h-4" /> 異常狀態</div>
                                    </button>
                                )}
                                
                                {module === 'purchaseInfo' && (
                                    <button 
                                        onClick={() => {
                                            setApiKey(''); 
                                            setShowApiModal(true);
                                        }} 
                                        disabled={isSyncing}
                                        className={`px-3 py-1.5 bg-blue-600 text-white rounded-lg text-sm font-bold flex items-center gap-1.5 shadow-md transition-all whitespace-nowrap ${isSyncing ? 'opacity-50 cursor-not-allowed' : 'hover:bg-blue-700'}`}
                                    >
                                        <Icon name={isSyncing ? 'loader' : 'cloud'} className={`w-4 h-4 ${isSyncing ? 'animate-spin' : ''}`} />
                                        {isSyncing ? '同步中...' : '同步雲端'}
                                    </button>
                                )}

                                {/* 💡 主選單上傳 Excel 按鈕已啟用 multiple */}
                                <label className={`px-3 py-1.5 bg-slate-700 text-white rounded-lg text-sm font-bold flex items-center gap-1.5 shadow-md transition-all whitespace-nowrap ${isUploading ? 'opacity-50 cursor-not-allowed' : 'cursor-pointer hover:bg-slate-800'}`}>
                                    <Icon name="upload" className="w-4 h-4 text-white" /> {isUploading ? '處理中...' : '上傳 Excel'}
                                    <input type="file" multiple accept=".xlsx, .xls, .csv" className="hidden" onChange={e => { 
                                        const files = Array.from(e.target.files);
                                        if (files.length === 0) return;
                                        if (module === 'order') onUploadOrder(files); else onUploadInv(files);
                                        e.target.value=''; 
                                    }} disabled={isUploading} />
                                </label>
                            </div>
                        </div>
                        {(currentFiles.length > 0 || msg) && (
                            <div className="px-4 py-1.5 bg-white/40 backdrop-blur-sm border-t border-slate-200/50 flex items-center gap-3 text-[10px] sm:text-xs font-mono text-slate-600 overflow-x-auto no-scrollbar">
                                {currentFiles.length > 0 && <span className="text-teal-800 bg-teal-100/80 px-2 py-0.5 rounded border border-teal-200/50 whitespace-nowrap">來源: {currentFiles.join(', ')}</span>}
                                {msg && <span className={`font-bold px-2 py-0.5 rounded border whitespace-nowrap ${msg.type === 'success' ? 'bg-emerald-50 text-emerald-700 border-emerald-200' : (msg.type === 'info' ? 'bg-blue-50 text-blue-700 border-blue-200' : 'bg-red-50 text-red-700 border-red-200')}`}>{msg.text}</span>}
                            </div>
                        )}
                    </header>
                    <main className="flex-1 relative p-4 md:p-6 overflow-hidden">
                        <div className={`absolute inset-4 md:inset-6 transition-opacity duration-300 ${module === 'purchaseInfo' ? 'opacity-100 z-10' : 'opacity-0 z-0 pointer-events-none'}`}>
                            <PurchaseSystem data={invState.data.purchaseInfo} globalSearch={globalSearch} onlyAbnormal={onlyAbnormal} onUploadInv={onUploadInv} />
                        </div>
                        <div className={`absolute inset-4 md:inset-6 transition-opacity duration-300 ${module === 'order' ? 'opacity-100 z-10' : 'opacity-0 z-0 pointer-events-none'}`}>
                            <OrderSystem data={orderState.data} columns={allOrderColumns} globalSearch={globalSearch} dates={dates} onUploadOrder={onUploadOrder} />
                        </div>
                        <div className={`absolute inset-4 md:inset-6 transition-opacity duration-300 ${module === 'inventory' ? 'opacity-100 z-10' : 'opacity-0 z-0 pointer-events-none'}`}>
                            <InventorySystem data={invState.data} globalSearch={globalSearch} onlyShortage={onlyShortage} onUploadInv={onUploadInv} />
                        </div>
                        <div className={`absolute inset-4 md:inset-6 transition-opacity duration-300 ${module === 'materialInventory' ? 'opacity-100 z-10' : 'opacity-0 z-0 pointer-events-none'}`}>
                            <StockSystem title="物料庫存" data={invState.data.materialInventory || []} showDataPanel={true} globalSearch={globalSearch} safetySearch={safetySearch} stockSearch={stockSearch} onUploadInv={onUploadInv} />
                        </div>
                        <div className={`absolute inset-4 md:inset-6 transition-opacity duration-300 ${module === 'consumableInventory' ? 'opacity-100 z-10' : 'opacity-0 z-0 pointer-events-none'}`}>
                            <StockSystem title="耗材庫存" data={invState.data.consumableInventory || []} showDataPanel={false} globalSearch={globalSearch} safetySearch={safetySearch} onUploadInv={onUploadInv} />
                        </div>
                        <div className={`absolute inset-4 md:inset-6 transition-opacity duration-300 ${module === 'detailedInfo' ? 'opacity-100 z-10' : 'opacity-0 z-0 pointer-events-none'}`}>
                            <DetailedInfoSystem orderData={orderState.data} invData={invState.data} globalSearch={globalSearch} orderColumns={allOrderColumns} />
                        </div>
                    </main>

                    {/* API Key Modal - 保持明文輸入，不自動紀錄 */}
                    {showApiModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm" onClick={() => setShowApiModal(false)}>
                            <div className="bg-white w-full max-w-md rounded-2xl shadow-2xl modal-animate overflow-hidden border border-slate-200" onClick={e => e.stopPropagation()}>
                                <div className="p-5 border-b border-slate-100 flex justify-between items-center bg-teal-50">
                                    <h3 className="font-bold text-teal-800 text-lg flex items-center gap-2">
                                        <Icon name="key" className="w-5 h-5"/> 同步連線設定
                                    </h3>
                                    <button onClick={() => setShowApiModal(false)} className="text-slate-400 hover:text-red-500 transition-colors">
                                        <Icon name="x" className="w-5 h-5"/>
                                    </button>
                                </div>
                                <div className="p-6 text-left">
                                    <p className="text-sm text-slate-600 mb-4 leading-relaxed">
                                        請輸入您的自訂 API 金鑰進行驗裝。
                                        <br/>
                                        <span className="text-red-500 text-xs font-bold font-sans">注意：金鑰輸入錯誤將導致 401 錯誤。</span>
                                    </p>
                                    <input
                                        type="text"
                                        autoComplete="off"
                                        className="w-full border border-slate-300 rounded-lg p-3 text-slate-700 focus:ring-2 focus:ring-teal-500 focus:border-teal-500 outline-none font-mono text-sm shadow-inner transition-all"
                                        placeholder="在此輸入金鑰..."
                                        value={apiKey}
                                        onChange={e => setApiKey(e.target.value)}
                                        autoFocus
                                    />
                                </div>
                                <div className="p-4 bg-slate-50 border-t border-slate-100 flex justify-end gap-3">
                                    <button 
                                        onClick={() => setShowApiModal(false)} 
                                        className="px-4 py-2 text-slate-600 font-medium hover:bg-slate-200 rounded-lg transition-colors"
                                    >
                                        取消
                                    </button>
                                    <button
                                        onClick={() => {
                                            setShowApiModal(false);
                                            syncFromApi(apiKey);
                                        }}
                                        disabled={!apiKey.trim()}
                                        className="px-5 py-2 bg-teal-600 hover:bg-teal-700 disabled:opacity-50 disabled:cursor-not-allowed text-white font-bold rounded-lg shadow-sm transition-colors flex items-center gap-2"
                                    >
                                        <Icon name="cloud" className="w-4 h-4"/>
                                        驗證並同步
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
